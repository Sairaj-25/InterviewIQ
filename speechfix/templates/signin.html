<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Signin/InterviewIQ AI</title>

  <link rel="stylesheet" href="/speechfix/static/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎙️</text></svg>">

  <!-- Bootstrap 5 -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" />
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,600;1,9..40,300&display=swap" rel="stylesheet" />

  <style>
    /* Add this to your style.css if you want to reuse it, or keep it here for layout */
    .auth-wrapper {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: calc(100vh - 140px); /* Adjusts for nav and footer */
      padding: 2rem 1rem;
    }
    .auth-card {
      width: 100%;
      max-width: 400px;
    }
    /* Simple styling to make Bootstrap inputs match your dark theme */
    .sf-input {
      background-color: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border, #333);
      color: #fff;
    }
    .sf-input:focus {
      background-color: rgba(255, 255, 255, 0.1);
      border-color: #0dcaf0; /* Match text-cyan */
      box-shadow: 0 0 0 0.25rem rgba(13, 202, 240, 0.25);
      color: #fff;
    }
  </style>
</head>

<body>
  <!-- NAV  -->
  <nav class="sf-nav">
    <span class="sf-nav-brand">
      <a href="/" style="text-decoration: none; color: inherit;">
        🎙&thinsp;<strong>InterviewIQ</strong>&thinsp;<span class="text-cyan">AI</span>
      </a>
    </span>
    <span class="sf-nav-badge d-none d-sm-flex">
      <a href="{{ url_for('signup_page') }}">Sign up</a>
    </span>
  </nav>

  <div class="app-wrapper">
    <div class="auth-wrapper">
      <div class="glass-card auth-card">
        <div class="sec-label" style="text-align: center; font-size: 1.5rem; margin-bottom: 1.5rem;">Sign In</div>
        
        <!-- HTMX Login Form -->
        <form hx-post="/api/v1/auth/login" 
              hx-target="#auth-message" 
              hx-swap="innerHTML"
              hx-indicator="#login-spinner">
          
          <div class="mb-3">
            <label for="username" class="form-label" style="color: var(--text-2, #aaa); font-size: 0.9rem;">Email Address</label>
            <!-- Using name="username" for standard OAuth2 Form compatibility -->
            <input type="email" class="form-control sf-input" id="username" name="username" required placeholder="you@example.com">
          </div>

          <div class="mb-4">
            <div class="d-flex justify-content-between">
              <label for="password" class="form-label" style="color: var(--text-2, #aaa); font-size: 0.9rem;">Password</label>
              <a href="#" style="color: var(--text-2, #aaa); font-size: 0.85rem; text-decoration: none;">Forgot?</a>
            </div>
            <input type="password" class="form-control sf-input" id="password" name="password" required placeholder="••••••••">
          </div>

          <!-- Target for HTMX error/success messages -->
          <div id="auth-message" class="mb-3 text-danger" style="font-size: 0.9rem; text-align: center;"></div>

          <button type="submit" class="btn-primary-sf w-100 d-flex justify-content-center align-items-center gap-2">
            <span>Sign In</span>
            <div id="login-spinner" class="sf-spinner htmx-indicator" style="width: 1rem; height: 1rem; border-width: 2px;"></div>
          </button>
        </form>

        <hr class="sf" style="margin: 1.5rem 0;">
        
        <p style="text-align: center; font-size: 0.9rem; color: var(--text-2, #aaa); margin: 0;">
          Don't have an account? <a href="{{ url_for('signup_page') }}" class="text-cyan" style="text-decoration: none;">Sign up</a>
        </p>
      </div>
    </div>

    <!--  FOOTER  -->
    <footer class="sf-footer">
      <span>Faster-Whisper</span> · <span>FFmpeg</span> · <span>Gemini Flash</span> · <span>FastAPI</span> · <span>HTMX</span> · <span>Bootstrap 5</span>
    </footer>
  </div>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://unpkg.com/htmx.org@1.9.10"></script>
</body>
</html>
